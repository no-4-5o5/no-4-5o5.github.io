        * { box-sizing: border-box; outline: none; transition: background 0.2s, color 0.2s, border 0.2s; }
        
        body, html {

            50% { box-shadow: 0 0 20px var(--accent), 0 0 30px var(--glow); border-color: var(--accent); }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function rgbToHex(rgb) {
            if (!rgb || rgb.startsWith('#')) return rgb;
            const parts = rgb.match(/\d+/g);
            if (!parts) return "#000000";
            return "#" + parts.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
        }

        function updateCustomTheme() {
            const colors = {
                bg: document.getElementById('color-bg').value,
                bg2: document.getElementById('color-bg2').value,
                side: document.getElementById('color-side').value,
                acc: document.getElementById('color-accent').value,
                txt: document.getElementById('color-text').value,
                cur: document.getElementById('color-cursor').value
            };
            document.body.removeAttribute('data-look');
            const root = document.documentElement;
            root.style.setProperty('--bg', colors.bg);
            root.style.setProperty('--bg2', colors.bg2);
            root.style.setProperty('--side', colors.side);
            root.style.setProperty('--accent', colors.acc);
            root.style.setProperty('--text', colors.txt);
            root.style.setProperty('--cursor-color', colors.cur);
            localStorage.setItem('p404_custom', JSON.stringify(colors));
        }

        function applyPreset(id) {
            const root = document.documentElement;
            const props = ['--bg', '--bg2', '--side', '--accent', '--text', '--cursor-color'];
            props.forEach(p => root.style.removeProperty(p));
            document.body.setAttribute('data-look', id);
            localStorage.setItem('p404_look', id);
            const style = getComputedStyle(document.body);
            document.getElementById('color-bg').value = rgbToHex(style.getPropertyValue('--bg').trim());
            document.getElementById('color-bg2').value = rgbToHex(style.getPropertyValue('--bg2').trim());
            document.getElementById('color-side').value = rgbToHex(style.getPropertyValue('--side').trim());
            document.getElementById('color-accent').value = rgbToHex(style.getPropertyValue('--accent').trim());
            document.getElementById('color-text').value = rgbToHex(style.getPropertyValue('--text').trim());
            document.getElementById('color-cursor').value = rgbToHex(style.getPropertyValue('--cursor-color').trim());
        }

        function resetToPreset() { localStorage.removeItem('p404_custom'); location.reload(); }
        function nukeStorage() { if(confirm("Nuke all data?")) { localStorage.clear(); location.reload(); } }

        function launchGame(url) { 
            document.getElementById('launcher').style.display = 'block'; 
            document.getElementById('game-frame').src = url; 
        }
        function closeGame() { document.getElementById('launcher').style.display = 'none'; document.getElementById('game-frame').src = ""; }
        
        function showTab(t) {
            ['content', 'settings'].forEach(id => document.getElementById(id + '-area').style.display = 'none');
            document.getElementById(`${t === 'home' ? 'content' : t}-area`).style.display = 'block';
            ['nav-home', 'nav-settings'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(`nav-${t}`).classList.add('active');
        }

        function renderGames() {
            const grid = document.getElementById('game-grid'); 
            const term = document.getElementById('search').value.toLowerCase();
            const filter = document.getElementById('filter-select').value;
            grid.innerHTML = '';
            
            // Fix: Filter out empty game slots before processing
            let filteredGames = games.filter(g => g.n && g.p);

            if (filter === "tests") {
                filteredGames = filteredGames.filter(g => g.n.includes('(TEST)'));
            } else if (filter === "working") {
                filteredGames = filteredGames.filter(g => !g.n.includes('(TEST)'));
            }

            filteredGames = filteredGames.filter(g => g.n.toLowerCase().includes(term));

            if (filter === "abc") filteredGames.sort((a, b) => a.n.localeCompare(b.n));
            else if (filter === "cba") filteredGames.sort((a, b) => b.n.localeCompare(a.n));
            else if (term === "" && filter === "default") shuffle(filteredGames);

            filteredGames.forEach(g => {
                const card = document.createElement('div'); 
                card.className = 'game-card' + (g.n.includes('(TEST)') ? ' test-glow' : '');
                card.innerText = g.n; card.onclick = () => launchGame(g.p); 
                grid.appendChild(card);
            });
        }

        function buildStyleGrid() {
            const grid = document.getElementById('style-grid');
            styleNames.forEach((name, i) => {
                const b = document.createElement('button'); b.className = 'side-btn'; b.innerText = name;
                b.onclick = () => applyPreset(i + 1);
                grid.appendChild(b);
            });
        }

        function setPreset(t, i) { document.title = t; document.getElementById('tab-icon').href = i; localStorage.setItem('p404_t', t); localStorage.setItem('p404_i', i); }
        function panic() { window.location.href = "https://classroom.google.com"; }
        function saveRecords() { localStorage.setItem('p404_rec', document.getElementById('records-text').value); }

        window.onmousemove = e => { if(document.body.classList.contains('unlocked')) points.push({ x: e.clientX, y: e.clientY, age: 0 }); };
        window.onclick = e => { if(document.body.classList.contains('unlocked')) ripple = {x: e.clientX, y: e.clientY, r: 0, a: 1}; };
        
        // Fix: Added resize listener to keep cursor trail accurate
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const style = getComputedStyle(document.documentElement);
            const curCol = style.getPropertyValue('--cursor-color').trim();
            if(points.length > 0) {
                const h = points[points.length-1]; 
                ctx.fillStyle = curCol; ctx.beginPath(); ctx.arc(h.x, h.y, 5, 0, 7); ctx.fill();
            }
            ctx.strokeStyle = curCol; ctx.lineWidth = 3; ctx.beginPath();
            points.forEach((p, i) => { p.age++; if(i==0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
            ctx.stroke(); points = points.filter(p => p.age < 20);
            if(ripple.a > 0) { ctx.strokeStyle = curCol; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(ripple.x, ripple.y, ripple.r+=4, 0, 7); ctx.stroke(); ripple.a -= 0.02; }
            requestAnimationFrame(animate);
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            renderGames(); buildStyleGrid(); animate();

            const custom = localStorage.getItem('p404_custom');
            if(custom) {
                const c = JSON.parse(custom);
                document.getElementById('color-bg').value = c.bg; document.getElementById('color-bg2').value = c.bg2;
                document.getElementById('color-side').value = c.side; document.getElementById('color-accent').value = c.acc;
                document.getElementById('color-text').value = c.txt; document.getElementById('color-cursor').value = c.cur;
                updateCustomTheme();
            } else { applyPreset(localStorage.getItem('p404_look') || '1'); }

            const t = localStorage.getItem('p404_t'); const i = localStorage.getItem('p404_i'); const r = localStorage.getItem('p404_rec');
            if(t) document.title = t; if(i) document.getElementById('tab-icon').href = i;
            if(r) document.getElementById('records-text').value = r;

            document.getElementById('game-frame').onload = function() {
                try {
                    const fw = this.contentWindow;
                    fw.sdk = new Proxy({}, { get: () => (...args) => { if(fw.onAdComplete) fw.onAdComplete(); } });
                } catch(e) { console.log("Ad-strip restricted by cross-origin policy."); }
            };
        }
    </script>
</body>
</html>
